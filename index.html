<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      viewport meta:
        - `viewport-fit=cover`  fills the entire screen including notch / home bar areas
        - `user-scalable=no`    prevents pinch-zoom which was triggering the browser
                                 overlay on fast double-taps
        - `maximum-scale=1`     belt-and-suspenders against zoom on input focus
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Tower Blaze Rescue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

      /* ── Reset ── */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;                 /* no scroll anywhere */
        background-color: #111827;
        font-family: 'Press Start 2P', monospace;

        /*
          These three together are the nuclear option for suppressing every
          browser-native touch behaviour that was causing the long-press popup
          and control cutoff:
            touch-action: none      — browser hands ALL touch events to JS
            -webkit-touch-callout   — disables the iOS "callout" (Copy/Paste/Look Up)
            user-select             — disables text selection on long press
        */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent; /* removes grey flash on tap */
      }

      /* Retro scanline overlay on the canvas */
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.08) 50%,
          rgba(0, 0, 0, 0.08)
        );
        background-size: 100% 4px;
        pointer-events: none;
      }

      /*
        Re-enable touch-action on interactive UI elements that are NOT game
        controls, so normal tapping still works for buttons / inputs on the
        menu and leaderboard screens.
      */
      button, input, a {
        touch-action: manipulation;  /* allows single-tap, blocks double-tap zoom */
        -webkit-tap-highlight-color: transparent;
      }

      /*
        Game control buttons get the strictest suppression — nothing should
        intercept their touches.
      */
      .game-btn {
        touch-action: none !important;
        -webkit-touch-callout: none !important;
        -webkit-user-select: none !important;
        user-select: none !important;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/":     "https://aistudiocdn.com/react@^19.2.1/",
          "react":      "https://aistudiocdn.com/react@^19.2.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
